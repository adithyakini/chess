<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet"
href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/www/css/chessboard.css">

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/www/js/chessboard.js"></script>

</head>

<body>

<div id="board" style="width: 500px"></div>

<script>

var board = Chessboard('board', {
    draggable: true,
    position: 'start',

    onDrop: function(source, target) {

        const move = source + target;

        window.parent.postMessage(
            {
                type: "streamlit:setComponentValue",
                value: move
            },
            "*"
        );
    }
});

</script>

</body>
</html>
